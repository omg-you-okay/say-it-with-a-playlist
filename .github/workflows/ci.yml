name: CI

on:
  pull_request:
    branches:
      - main
  # Also run on main itself: two individually-green PRs can still conflict
  # semantically once merged, and branch protection alone never re-checks that.
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Postgres for the integration tests (Resources + auth route handlers).
    # The DB layer arrives this iteration, so CI grows a database (ADR 0004).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: say_it_with_a_playlist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d say_it_with_a_playlist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/say_it_with_a_playlist

    steps:
      - name: check out the code
        uses: actions/checkout@v6

      - name: install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: apply database migrations
        run: pnpm db:migrate

      - name: lint
        run: pnpm lint

      - name: format check
        run: pnpm format:check

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

      # End-to-end layout tests in a real browser (ADR 0018). Both viewport
      # projects are Chromium-based, so only Chromium is installed. Playwright
      # serves the build produced above via `next start` (a build break should
      # read as a build failure, not an e2e timeout) and drives it against the
      # Postgres service already up for the integration tests.
      - name: install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: e2e
        run: pnpm exec playwright test

      # Keep the trace/report from a failed run so a CI-only layout failure is
      # debuggable as a filmstrip rather than a bare assertion diff.
      - name: upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
